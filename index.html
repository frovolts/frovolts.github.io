<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EEE Makers Hub — Candidate Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0f1f3d;
    --navy2:   #1a3260;
    --gold:    #e8a020;
    --cream:   #f9f6f0;
    --text:    #1a1a2e;
    --muted:   #6b7280;
    --border:  #e2d9cc;
    --tag-bg:  #eef2ff; --tag-txt: #3730a3;
    --yes-bg:  #dcfce7; --yes-txt: #166534;
    --no-bg:   #fff3cd; --no-txt:  #856404;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* ── GATE ── */
  #gate {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--navy);
    background-image:
      repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(255,255,255,.03) 39px, rgba(255,255,255,.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,.03) 39px, rgba(255,255,255,.03) 40px);
  }
  .gate-box {
    text-align: center; padding: 3rem 2.5rem; max-width: 380px; width: 90%;
    border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); border-radius: 16px;
  }
  .gate-logo  { font-family: 'Space Mono', monospace; color: var(--gold); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1.5rem; }
  .gate-title { font-family: 'Space Mono', monospace; color: #fff; font-size: 1.3rem; margin-bottom: .5rem; }
  .gate-sub   { color: rgba(255,255,255,.45); font-size: .85rem; margin-bottom: 2rem; }
  .gate-input {
    width: 100%; padding: .85rem 1rem; background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.15); border-radius: 8px; color: #fff;
    font-family: 'Space Mono', monospace; font-size: .9rem; letter-spacing: 2px;
    text-align: center; outline: none; margin-bottom: 1rem; transition: border-color .2s;
  }
  .gate-input:focus { border-color: var(--gold); }
  .gate-btn {
    width: 100%; padding: .85rem; background: var(--gold); border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: .95rem;
    color: var(--navy); cursor: pointer; transition: opacity .2s;
  }
  .gate-btn:hover { opacity: .88; }
  .gate-err { color: #f87171; font-size: .8rem; margin-top: .75rem; min-height: 1.2em; }

  /* ── APP ── */
  #app { display: none; }

  .topbar {
    background: var(--navy); padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--gold);
  }
  .topbar-brand { font-family: 'Space Mono', monospace; color: #fff; font-size: .85rem; }
  .topbar-brand span { color: var(--gold); }
  .topbar-count { font-family: 'Space Mono', monospace; color: rgba(255,255,255,.4); font-size: .75rem; }

  .search-wrap { padding: 2rem 2rem 1rem; max-width: 900px; margin: 0 auto; }
  .search-row  { display: flex; gap: .75rem; flex-wrap: wrap; }
  .search-box {
    flex: 1; min-width: 200px; padding: .8rem 1.1rem;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'Space Mono', monospace; font-size: .85rem; color: var(--text);
    background: #fff; outline: none; transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--navy); }
  .filter-sel {
    padding: .8rem 1rem; border: 1.5px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: .85rem; background: #fff;
    color: var(--text); outline: none; cursor: pointer;
  }
  .results-meta { margin-top: .9rem; font-size: .78rem; color: var(--muted); font-family: 'Space Mono', monospace; }

  .list { max-width: 900px; margin: 0 auto; padding: .5rem 2rem 4rem; display: flex; flex-direction: column; gap: .85rem; }

  /* ── CARD ── */
  .card {
    background: #fff; border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; cursor: pointer; transition: box-shadow .2s, border-color .2s;
  }
  .card:hover { box-shadow: 0 4px 20px rgba(15,31,61,.09); border-color: #b0bcd4; }
  .card.open  { border-color: var(--navy2); }

  .card-hdr { display: flex; align-items: center; gap: 1rem; padding: .95rem 1.25rem; }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%; background: var(--navy2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace; font-size: .75rem; color: #fff; flex-shrink: 0;
  }
  .card-name { font-weight: 600; font-size: .97rem; }
  .card-sub  { font-size: .78rem; color: var(--muted); margin-top: 2px; font-family: 'Space Mono', monospace; }
  .card-tags { margin-left: auto; display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .tag { font-size: .68rem; font-weight: 500; padding: 3px 9px; border-radius: 20px; background: var(--tag-bg); color: var(--tag-txt); white-space: nowrap; }
  .tag.yes { background: var(--yes-bg); color: var(--yes-txt); }
  .tag.no  { background: var(--no-bg);  color: var(--no-txt);  }
  .chevron { margin-left: .75rem; color: var(--muted); font-size: .95rem; transition: transform .25s; flex-shrink: 0; }
  .card.open .chevron { transform: rotate(180deg); }

  /* ── DETAIL ── */
  .card-detail { display: none; border-top: 1px solid var(--border); padding: 1.1rem 1.25rem 1.4rem; }
  .card.open .card-detail { display: block; }

  .sec { margin-top: 1.1rem; }
  .sec:first-child { margin-top: 0; }
  .sec-title {
    font-family: 'Space Mono', monospace; font-size: .6rem; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase; margin-bottom: .5rem;
  }

  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: .5rem; }
  .cell { background: var(--cream); border-radius: 8px; padding: .55rem .8rem; }
  .cell-lbl { font-size: .64rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  .cell-val { font-size: .86rem; color: var(--text); font-weight: 500; line-height: 1.4; word-break: break-word; }

  /* Improved Text Blocks to Handle Links & Paragraphs */
  .textblock { 
    background: var(--cream); border-radius: 8px; padding: .7rem .9rem; 
    font-size: .84rem; line-height: 1.7; color: var(--text); 
    word-break: break-word; 
  }
  .textblock a { color: var(--navy2); font-weight: 600; text-decoration: underline; }
  .textblock a:hover { color: var(--gold); }

  .pill-row { display: flex; flex-wrap: wrap; gap: .4rem; }
  .pill-dom { font-size: .71rem; padding: 4px 10px; background: #e8edf8; color: #1e3a6e; border-radius: 6px; font-weight: 500; }
  .pill-non { font-size: .71rem; padding: 4px 10px; background: #f0fdf4; color: #166534; border-radius: 6px; font-weight: 500; }

  .link-row { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: .6rem; }
  .link-btn {
    font-size: .78rem; padding: 5px 13px; border: 1.5px solid var(--border);
    border-radius: 8px; text-decoration: none; color: var(--navy2); font-weight: 600;
    transition: background .15s, border-color .15s; display: inline-flex; align-items: center; gap: 4px;
  }
  .link-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

  .num-badge {
    display: inline-block; background: var(--navy); color: #fff;
    font-family: 'Space Mono', monospace; font-size: .6rem;
    padding: 2px 6px; border-radius: 4px; margin-right: .5rem; vertical-align: middle;
  }
  .avail-bar { display: flex; gap: 4px; align-items: center; margin-top: 4px; }
  .avail-pip { width: 18px; height: 7px; border-radius: 3px; background: #dde3f0; }
  .avail-pip.on { background: var(--navy2); }

  .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); font-family: 'Space Mono', monospace; font-size: .8rem; line-height: 2; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">EEE Makers Hub</div>
    <div class="gate-title">Candidate Portal</div>
    <div class="gate-sub">Session 2024–25 · Restricted access</div>
    <input class="gate-input" id="pw-input" type="password" placeholder="Enter password" autocomplete="off">
    <button class="gate-btn" onclick="checkPw()">Enter</button>
    <div class="gate-err" id="pw-err"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">EEE <span>Makers Hub</span> — Candidate Portal by GEMINI</div>
    <div class="topbar-count" id="topbar-count"></div>
  </div>

  <div class="search-wrap">
    <div class="search-row">
      <input class="search-box" id="search" type="text" placeholder="Search by name, roll, email…" oninput="render()">
      <select class="filter-sel" id="f-prior" onchange="render()">
        <option value="">All applicants</option>
        <option value="yes">Has prior experience</option>
        <option value="no">No prior experience</option>
      </select>
      <select class="filter-sel" id="f-domain" onchange="render()">
        <option value="">All domains</option>
      </select>
      <select class="filter-sel" id="f-avail" onchange="render()">
        <option value="">Any availability</option>
        <option value="5">Avail: 5 (max)</option>
        <option value="4">Avail: 4+</option>
        <option value="3">Avail: 3+</option>
      </select>
    </div>
    <div class="results-meta" id="results-meta"></div>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
// ── CONFIGURATION ─────────────────────────────────────────────────
const PASSWORD = "eeemakers2025";
const CSV_PATH = "data/responses.csv";

// ── Column map (0-based) ─────────────────────────────────────────
const C = {
  TS:0, NAME:1, ROLL:2, PHONE:3, EMAIL:4, YEAR:5,
  CV:6, LI:7, GH:8,
  DOMAINS:9, EXPLVL:10, PRIOR:11, PRIORDESC:12,
  PROJECT:13, AVAIL:14, EVENTS:15, NONTECH:16, COMMIT:17
};

const DOM_SHORT = {
  "Microcontroller/Embedded Systems (e.g., Arduino, Raspberry Pi)": "Embedded Systems",
  "Power Electronics and Renewable Energy":  "Power Electronics",
  "Robotics and Automation":                 "Robotics",
  "Circuit Design (PCB, Schematic)":         "Circuit Design",
  "IoT (Internet of Things) and Wireless Communication": "IoT / Wireless",
  "Programming and Software Development (Python, C++)":  "Python / C++",
  "Machine Learning/AI Applications":        "ML / AI",
  "Hardware Troubleshooting and Repair":     "HW Troubleshooting",
  "Documentation and Technical Writing":     "Documentation",
};

const AVAIL_LBL = {"1":"~1 hr/wk","2":"~2 hrs/wk","3":"~3 hrs/wk","4":"~4 hrs/wk","5":"5+ hrs/wk"};
const EXPLVL_LBL = {"1":"Beginner","2":"Novice","3":"Intermediate","4":"Advanced","5":"Expert"};

let all = [];

// ── PASSWORD ──────────────────────────────────────────────────────
function checkPw() {
  if (document.getElementById("pw-input").value.trim() === PASSWORD) {
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display  = "block";
    loadCSV();
  } else {
    document.getElementById("pw-err").textContent = "Incorrect password. Try again.";
  }
}
document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") checkPw(); });

// ── CSV PARSER ────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  return lines.map(line => {
    const out = []; let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { out.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    out.push(cur.trim());
    return out;
  });
}

function loadCSV() {
  fetch(CSV_PATH)
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
    .then(text => {
      const rows = parseCSV(text).slice(1).filter(r => (r[C.ROLL]||"").trim());
      // deduplicate — keep last submission per roll
      const seen = {};
      rows.forEach(r => { seen[r[C.ROLL].trim()] = r; });
      all = Object.values(seen);
      buildDomainFilter();
      document.getElementById("topbar-count").textContent = all.length + " candidates loaded";
      render();
    })
    .catch(err => {
      document.getElementById("list").innerHTML =
        `<div class="empty">⚠ Could not load data (${err.message})<br>Make sure <code>data/responses.csv</code> exists and you are running a local server.</div>`;
    });
}

function buildDomainFilter() {
  const set = new Set();
  all.forEach(r => {
    (r[C.DOMAINS]||"").split(",").forEach(d => {
      const s = DOM_SHORT[d.trim()] || d.trim();
      if (s) set.add(s);
    });
  });
  const sel = document.getElementById("f-domain");
  [...set].sort().forEach(d => {
    const o = document.createElement("option"); o.value = d; o.textContent = d; sel.appendChild(o);
  });
}

// ── HELPERS ───────────────────────────────────────────────────────
const g       = (r, c) => (r[c] || "").trim();
const hasPri  = r => /^yes$/i.test(g(r, C.PRIOR));
const blank   = v => !v || /^(none|—|no|n\/a|none mentioned|none of these)$/i.test(v);
const inits   = n => n.split(" ").filter(Boolean).map(w => w[0]).join("").slice(0,2).toUpperCase();
const fmtDoms = raw => (raw||"").split(",").map(d => DOM_SHORT[d.trim()] || d.trim()).filter(Boolean);
const fmtNon  = raw => (raw||"").split(",").map(p=>p.trim()).filter(p=>p && !/none of these/i.test(p));
const availPips = n => Array.from({length:5},(_,i)=>`<span class="avail-pip${i<n?' on':''}"></span>`).join("");

// URL Extractor (Fixes URLs even if missing https://)
const makeUrl = s => {
  if (blank(s)) return null;
  let url = s.trim();
  if (!url.startsWith("http")) {
    if (url.includes("linkedin.com") || url.includes("github.com") || url.includes("drive.google.com") || url.includes("www.")) {
      url = "https://" + url;
    } else { return null; }
  }
  return url;
};

// Text Linkifier (Finds links in text paragraphs and makes them clickable + keeps newlines)
const escapeHTML = str => str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
const formatText = text => {
  if (blank(text)) return "—";
  let safeText = escapeHTML(text);
  // Auto-detect and linkify URLs
  safeText = safeText.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" onclick="event.stopPropagation()">$1</a>');
  // Preserve line breaks
  return safeText.replace(/\n/g, '<br>');
};

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const q    = document.getElementById("search").value.toLowerCase();
  const fpr  = document.getElementById("f-prior").value;
  const fdom = document.getElementById("f-domain").value;
  const favl = parseInt(document.getElementById("f-avail").value) || 0;

  const filtered = all.filter(r => {
    if (q && ![g(r,C.NAME),g(r,C.ROLL),g(r,C.EMAIL)].some(v=>v.toLowerCase().includes(q))) return false;
    if (fpr === "yes" && !hasPri(r)) return false;
    if (fpr === "no"  &&  hasPri(r)) return false;
    if (fdom && !fmtDoms(g(r,C.DOMAINS)).includes(fdom)) return false;
    if (favl && parseInt(g(r,C.AVAIL)) < favl) return false;
    return true;
  });

  document.getElementById("results-meta").textContent = `Showing ${filtered.length} of ${all.length} applicants`;

  const list = document.getElementById("list");
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No candidates match your filters.</div>';
    return;
  }
  list.innerHTML = filtered.map((r, i) => cardHTML(r, i+1)).join("");
  list.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
      const was = card.classList.contains("open");
      list.querySelectorAll(".card").forEach(c => c.classList.remove("open"));
      if (!was) card.classList.add("open");
    });
  });
}

// ── CARD ─────────────────────────────────────────────────────────
function cardHTML(r, num) {
  const ts      = g(r, C.TS).split(" ")[0] || "—"; // Date applied
  const name    = g(r, C.NAME)  || "Unknown";
  const roll    = g(r, C.ROLL)  || "—";
  const phone   = g(r, C.PHONE) || "—";
  const email   = g(r, C.EMAIL) || "—";
  const year    = g(r, C.YEAR)  || "—";
  
  const prior   = hasPri(r);
  const avail   = g(r, C.AVAIL);
  const explvl  = g(r, C.EXPLVL);
  const domains = fmtDoms(g(r, C.DOMAINS));
  const nontech = fmtNon(g(r, C.NONTECH));
  
  const cv      = makeUrl(g(r, C.CV));
  const li      = makeUrl(g(r, C.LI));
  const gh      = makeUrl(g(r, C.GH));

  const domPills  = domains.map(d=>`<span class="pill-dom">${d}</span>`).join("") || "<span style='color:var(--muted);font-size:.84rem'>—</span>";
  const nonPills  = nontech.map(n=>`<span class="pill-non">${n}</span>`).join("") || "<span style='color:var(--muted);font-size:.84rem'>—</span>";
  
  const linkBtns  = [
    cv ? `<a class="link-btn" href="${cv}" target="_blank" onclick="event.stopPropagation()">📄 CV / Portfolio</a>` : "",
    li ? `<a class="link-btn" href="${li}" target="_blank" onclick="event.stopPropagation()">💼 LinkedIn</a>` : "",
    gh ? `<a class="link-btn" href="${gh}" target="_blank" onclick="event.stopPropagation()">💻 GitHub</a>` : "",
  ].filter(Boolean).join("");

  const priorDesc  = formatText(g(r, C.PRIORDESC));
  const project    = formatText(g(r, C.PROJECT));
  const events     = formatText(g(r, C.EVENTS));
  
  const priLabel   = prior ? "Yes" : "No — eager to start";
  const availLabel = AVAIL_LBL[avail] || avail || "—";
  const expLabel   = EXPLVL_LBL[explvl] || (explvl ? `${explvl}/5` : "—");
  const availN     = parseInt(avail) || 0;

  return `
  <div class="card">
    <div class="card-hdr">
      <div class="avatar">${inits(name)}</div>
      <div>
        <div class="card-name"><span class="num-badge">#${num}</span>${name}</div>
        <div class="card-sub">Roll: ${roll} · ${year} · Applied: ${ts}</div>
      </div>
      <div class="card-tags">
        ${domains.slice(0,2).map(d=>`<span class="tag">${d}</span>`).join("")}
        <span class="tag ${prior?'yes':'no'}">${prior?"Exp ✓":"No Exp"}</span>
      </div>
      <div class="chevron">▾</div>
    </div>

    <div class="card-detail">

      <div class="sec">
        <div class="sec-title">Contact</div>
        <div class="grid-4">
          <div class="cell"><div class="cell-lbl">Phone</div><div class="cell-val">${phone}</div></div>
          <div class="cell"><div class="cell-lbl">Email</div><div class="cell-val">${email}</div></div>
          <div class="cell"><div class="cell-lbl">Academic Year</div><div class="cell-val">${year}</div></div>
          <div class="cell"><div class="cell-lbl">Commitment</div><div class="cell-val">${g(r,C.COMMIT)||'—'}</div></div>
        </div>
        ${linkBtns ? `<div class="link-row">${linkBtns}</div>` : ""}
      </div>

      <div class="sec">
        <div class="sec-title">Profile</div>
        <div class="grid-4">
          <div class="cell">
            <div class="cell-lbl">Availability</div>
            <div class="cell-val">${availLabel}</div>
            <div class="avail-bar">${availPips(availN)}</div>
          </div>
          <div class="cell">
            <div class="cell-lbl">Experience Level</div>
            <div class="cell-val">${expLabel}</div>
            <div class="avail-bar">${availPips(parseInt(explvl)||0)}</div>
          </div>
          <div class="cell"><div class="cell-lbl">Prior Participation</div><div class="cell-val">${priLabel}</div></div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-title">Technical Domains</div>
        <div class="pill-row">${domPills}</div>
      </div>

      <div class="sec">
        <div class="sec-title">Non-Technical Skills</div>
        <div class="pill-row">${nonPills}</div>
      </div>

      <div class="sec">
        <div class="sec-title">Prior Experience / How They'd Get Involved</div>
        <div class="textblock">${priorDesc}</div>
      </div>

      <div class="sec">
        <div class="sec-title">Most Significant Project / Achievement</div>
        <div class="textblock">${project}</div>
      </div>

      <div class="sec">
        <div class="sec-title">EEE Makers Hub Events Attended</div>
        <div class="textblock">${events}</div>
      </div>

    </div>
  </div>`;
}
</script>
</body>
</html>
